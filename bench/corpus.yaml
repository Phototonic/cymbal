      - name: overloaded_create_server
        symbol: createServer
        op: search
        why: Helper name appears in real implementation plus playground examples.
        grep_noise_min: 200
        cymbal_contains:
          - "function createServer packages/vite/src/node/server/index.ts:408"
        cymbal_max_matches: 20
        expect_smaller_output: true

