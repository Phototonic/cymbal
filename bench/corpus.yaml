                line: 228
                kind: "interface"
          show:
            file: "packages/vite/src/node/server/index.ts"
            line: 228
      - name: defineConfig
        file_contains: "config.ts"
        kind: function
        show_contains: "defineConfig("
        refs_min: 1
        ground_truth:
          search:
            exact: true
            expected:
