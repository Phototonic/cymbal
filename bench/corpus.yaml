# Benchmark corpus — pinned refs for reproducibility.
# Run: go run ./bench setup   (clones repos into bench/.corpus/)
# Run: go run ./bench run     (executes benchmarks)

repos:
  - name: gin
    url: https://github.com/gin-gonic/gin
    ref: v1.10.0
    language: go
    symbols:
      - name: New
        file_contains: "gin.go"
        kind: function
        show_contains: "func New("
        refs_min: 1
      - name: ServeHTTP
        file_contains: "gin.go"
        kind: method
        show_contains: "func (engine *Engine) ServeHTTP"
        refs_min: 1
      - name: HandlerFunc
        file_contains: "gin.go"
        kind: type
        show_contains: "type HandlerFunc"
        refs_min: 1
      - name: Context
        file_contains: "context.go"
        kind: struct
        show_contains: "type Context struct"
        refs_min: 1

  - name: kubectl
    url: https://github.com/kubernetes/kubectl
    ref: v0.32.1
    language: go
    symbols:
      - name: NewCmdApply
        file_contains: "apply.go"
        kind: function
        show_contains: "func NewCmdApply"
        refs_min: 0
      - name: NewCmdGet
        file_contains: "get.go"
        kind: function
        show_contains: "func NewCmdGet"
        refs_min: 0
      - name: Factory
        file_contains: "factory.go"
        kind: interface
        show_contains: "type Factory interface"
        refs_min: 0

  - name: fastapi
    url: https://github.com/fastapi/fastapi
    ref: "0.115.6"
    language: python
    symbols:
      - name: FastAPI
        file_contains: "applications.py"
        kind: class
        show_contains: "class FastAPI"
        refs_min: 1
      - name: Depends
        file_contains: "params.py"
        kind: class
        show_contains: "class Depends"
        refs_min: 1
      - name: APIRouter
        file_contains: "routing.py"
        kind: class
        show_contains: "class APIRouter"
        refs_min: 1

  - name: vite
    url: https://github.com/vitejs/vite
    ref: v6.0.0
    language: typescript
    symbols:
      - name: createServer
        file_contains: "server/index.ts"
        kind: function
        show_contains: "createServer("
        refs_min: 1
      - name: ViteDevServer
        file_contains: "server/index.ts"
        kind: interface
        show_contains: "ViteDevServer"
        refs_min: 0
      - name: defineConfig
        file_contains: "config.ts"
        kind: function
        show_contains: "defineConfig("
        refs_min: 1

  - name: ripgrep
    url: https://github.com/BurntSushi/ripgrep
    ref: "14.1.1"
    language: rust
    symbols:
      - name: Searcher
        file_contains: "mod.rs"
        kind: struct
        show_contains: "struct Searcher"
        refs_min: 0
      - name: SearchWorker
        file_contains: "search.rs"
        kind: struct
        show_contains: "struct SearchWorker"
        refs_min: 0

  - name: guava
    url: https://github.com/google/guava
    ref: v33.4.8
    language: java
    symbols:
      - name: ImmutableList
        file_contains: "ImmutableList.java"
        kind: class
        show_contains: "class ImmutableList"
        refs_min: 0
      - name: Preconditions
        file_contains: "Preconditions.java"
        kind: class
        show_contains: "class Preconditions"
        refs_min: 0
      - name: Optional
        file_contains: "Optional.java"
        kind: class
        show_contains: "class Optional"
        refs_min: 0

  - name: jq
    url: https://github.com/jqlang/jq
    ref: jq-1.7.1
    language: c
    symbols:
      - name: jv_parse
        file_contains: "jv_parse.c"
        kind: function
        show_contains: "jv_parse"
        refs_min: 0
      - name: jq_next
        file_contains: "execute.c"
        kind: function
        show_contains: "jq_next"
        refs_min: 0
