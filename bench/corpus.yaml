  - name: jq
    url: https://github.com/jqlang/jq
    ref: jq-1.7.1
    language: c
    tier: simple
    complexity: low
    tags: [c, parser, mixed-struct-function-names]
    symbols:
      - name: jv_parse
        file_contains: "jv_parse.c"
        kind: function
        show_contains: "jv_parse"
        refs_min: 0
        search_contains:
          - "function jv_parse src/jv_parse.c:905"
        ground_truth:
          search:
            exact: true
            expected:
              - file: "src/jv_parse.c"
                line: 905
                kind: "function"
          show:
            file: "src/jv_parse.c"
            line: 905
      - name: jq_next
        file_contains: "execute.c"
        kind: function
        show_contains: "jq_next"
        refs_min: 0
        ground_truth:
          search:
            exact: true
            expected:
              - file: "src/execute.c"
                line: 341
                kind: "function"
          show:
            file: "src/execute.c"
            line: 341
    footguns:
      - name: parser_name_collision
        symbol: jv_parse
        op: search
        why: Parser function name collides with parser structs and declarations.
        grep_noise_min: 50
        cymbal_contains:
          - "function jv_parse src/jv_parse.c:905"
        cymbal_max_matches: 20
        expect_smaller_output: true
