# Benchmark corpus — pinned refs for reproducibility.
# Run: go run ./bench setup   (clones repos into bench/.corpus/)
# Run: go run ./bench run     (executes benchmarks)

repos:
  - name: gin
    url: https://github.com/gin-gonic/gin
    ref: v1.10.0
    language: go
    tier: simple
    complexity: low
    tags: [web, common-names, request-context]
    symbols:
      - name: New
        file_contains: "gin.go"
        kind: function
        show_contains: "func New("
        refs_min: 1
        ground_truth:
          search:
            exact: true
            expected:
              - file: "gin.go"
                line: 188
                kind: "function"
          show:
            file: "gin.go"
            line: 188
      - name: IRoutes
        file_contains: "routergroup.go"
        kind: interface
        show_contains: "type IRoutes interface"
        refs_min: 1
        # Go interface embedding: IRouter embeds IRoutes in its type
        # declaration, so cymbal should report IRouter as an implementor.
        # Go struct→interface conformance is structural (not declarative),
        # so concrete types like RouterGroup intentionally do NOT appear.
        ground_truth:
          search:
            exact: true
            expected:
              - file: "routergroup.go"
                line: 33
                kind: "interface"
          impls:
            expected:
              - implementer: "IRouter"
                file: "routergroup.go"
            forbid_noise:
              # Concrete types that satisfy IRoutes only via structural typing
              # must NOT appear — cymbal is explicit-declaration only.
              - "RouterGroup"
              - "Engine"
      - name: ServeHTTP
        file_contains: "gin.go"
        kind: method
        show_contains: "func (engine *Engine) ServeHTTP"
        refs_min: 1
        ground_truth:
          search:
            exact: true
            canonical:
              file: "gin.go"
              line: 583
              kind: "method"
            prefer_paths:
              - "gin.go"
            avoid_paths:
              - "_test.go"
            expected:
              - file: "utils_test.go"
                line: 31
                kind: "method"
              - file: "gin.go"
                line: 583
                kind: "method"
          show:
            file: "gin.go"
            line: 583
          refs:
            expected:
              - file: "auth_test.go"
                line: 95
              - file: "auth_test.go"
                line: 114
              - file: "auth_test.go"
                line: 134
              - file: "auth_test.go"
                line: 152
              - file: "auth_test.go"
                line: 171
              - file: "benchmarks_test.go"
                line: 158
              - file: "context.go"
                line: 1086
              - file: "gin_integration_test.go"
                line: 409
              - file: "gin_test.go"
                line: 753
              - file: "githubapi_test.go"
                line: 455
              - file: "githubapi_test.go"
                line: 471
              - file: "routergroup.go"
                line: 237
              - file: "routes_test.go"
                line: 30
              - file: "utils.go"
                line: 49
      - name: HandlerFunc
        file_contains: "gin.go"
        kind: type
        show_contains: "type HandlerFunc"
        refs_min: 1
        ground_truth:
          search:
            exact: true
            expected:
              - file: "gin.go"
                line: 48
                kind: "type"
          show:
            file: "gin.go"
            line: 48
          refs:
            expected:
              - file: "context_test.go"
                line: 2393
              - file: "context_test.go"
                line: 2588
              - file: "response_writer_test.go"
                line: 127
      - name: Context
        file_contains: "context.go"
        kind: struct
        show_contains: "type Context struct"
        refs_min: 1
        search_contains:
          - "struct Context context.go:55"
        refs_contains:
          - "context.go:"
        ground_truth:
          search:
            exact: true
            expected:
              - file: "context.go"
                line: 55
                kind: "struct"
          show:
            file: "context.go"
            line: 55
          refs:
            expected:
              - file: "context.go"
                line: 117
              - file: "context.go"
                line: 1220
              - file: "context.go"
                line: 1229
              - file: "context.go"
                line: 1237
              - file: "context.go"
                line: 1245
              - file: "context.go"
                line: 1266
              - file: "context_test.go"
                line: 2423
              - file: "context_test.go"
                line: 2457
              - file: "context_test.go"
                line: 2652
              - file: "gin.go"
                line: 240
    footguns:
      - name: common_name_context
        symbol: Context
        op: search
        why: Generic name with many text hits across request context usage.
        grep_noise_min: 500
        cymbal_contains:
          - "struct Context context.go:55"
        cymbal_max_matches: 8
        expect_smaller_output: true
    multi_cases:
      # Batch show with per-symbol headers.
      - name: show_batch_symbols
        op: show
        symbols: [New, Default, HandlerFunc]
        expect_hits:
          - "═══ New ═══"
          - "═══ Default ═══"
          - "═══ HandlerFunc ═══"
          - "func New("
          - "func Default"
      # Multi-symbol trace + dedupe + attribution. Default calls New, so
      # New-owned callees reached from both show up tagged [Default,New].
      - name: trace_union_default_new
        op: trace
        symbols: [Default, New]
        flags: ["-d", "1", "-n", "50"]
        expect_hits:
          - "symbols: Default,New"
          - "downward (callees)"
        expect_attribution:
          - name: debugPrintWARNINGNew
            sources: [Default, New]
          - name: allocateContext
            sources: [Default, New]
      # Multi-symbol impact: union of callers across two methods.
      - name: impact_union_servehttp_handlecontext
        op: impact
        symbols: [ServeHTTP, HandleContext]
        flags: ["-D", "1", "-n", "30"]
        expect_hits:
          - "symbols: ServeHTTP,HandleContext"
      # Batch impls: not-found rows stay in order with the banner headers.
      - name: impls_batch_unresolved
        op: impls
        symbols: [Reader, Writer, Closer]
        expect_hits:
          - "═══ Reader ═══"
          - "═══ Writer ═══"
          - "═══ Closer ═══"

  - name: kubectl
    url: https://github.com/kubernetes/kubectl
    ref: v0.32.1
    language: go
    tier: medium
    complexity: medium
    tags: [cli, interfaces, factory-pattern]
    symbols:
      - name: NewCmdApply
        file_contains: "apply.go"
        kind: function
        show_contains: "func NewCmdApply"
        refs_min: 0
        ground_truth:
          search:
            exact: true
            expected:
              - file: "pkg/cmd/apply/apply.go"
                line: 198
                kind: "function"
          show:
            file: "pkg/cmd/apply/apply.go"
            line: 198
      - name: NewCmdGet
        file_contains: "get.go"
        kind: function
        show_contains: "func NewCmdGet"
        refs_min: 0
        ground_truth:
          search:
            exact: true
            expected:
              - file: "pkg/cmd/get/get.go"
                line: 161
                kind: "function"
          show:
            file: "pkg/cmd/get/get.go"
            line: 161
      - name: Factory
        file_contains: "factory.go"
        kind: interface
        show_contains: "type Factory interface"
        refs_min: 0
        search_contains:
          - "interface Factory pkg/cmd/util/factory.go:41"
        ground_truth:
          search:
            exact: true
            canonical:
              file: "pkg/cmd/util/factory.go"
              line: 41
              kind: "interface"
            prefer_paths:
              - "pkg/cmd/util/"
            expected:
              - file: "pkg/cmd/util/factory.go"
                line: 41
                kind: "interface"
          show:
            file: "pkg/cmd/util/factory.go"
            line: 41
          # Factory interface embeds two other interfaces by name. When --of
          # is used the 'expected' list matches against the edge Target (what
          # Factory itself declares as a parent/embedded type), not the
          # implementer. factoryImpl is a struct that satisfies Factory via
          # Go's structural typing — cymbal's declarative graph does not and
          # should not include it anywhere.
          impls:
            of: "Factory"
            expected:
              - implementer: "RESTClientGetter"
                file: "pkg/cmd/util/factory.go"
              - implementer: "OpenAPIResourcesGetter"
                file: "pkg/cmd/util/factory.go"
    footguns:
      - name: interface_name_factory
        symbol: Factory
        op: search
        why: Broad interface name creates high grep noise and variable collisions.
        grep_noise_min: 300
        cymbal_contains:
          - "interface Factory pkg/cmd/util/factory.go:41"
        cymbal_max_matches: 5
        expect_smaller_output: true

